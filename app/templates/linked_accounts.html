<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked Accounts - E-Paisa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <i class="fas fa-wallet"></i>
                </div>
                <span class="sidebar-logo-text">E-Paisa</span>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('main.wallet') }}" class="sidebar-nav-item">
                    <i class="fas fa-home"></i>
                    <span>Wallet</span>
                </a>
                <a href="{{ url_for('main.add_money') }}" class="sidebar-nav-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>Add Money</span>
                </a>
                <a href="{{ url_for('main.withdraw_money') }}" class="sidebar-nav-item">
                    <i class="fas fa-minus-circle"></i>
                    <span>Withdraw</span>
                </a>
                <a href="{{ url_for('main.linked_accounts_page') }}" class="sidebar-nav-item active">
                    <i class="fas fa-university"></i>
                    <span>Accounts</span>
                </a>
                <a href="{{ url_for('main.wallet') }}" class="sidebar-nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Summary</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Linked Accounts</h1>
                    <p class="page-subtitle">Manage your connected bank accounts and wallets</p>
                </div>
                <button class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Add New Account
                </button>
            </div>

            <div class="card">
                {% for account in linked_accounts %}
                <div class="account-card">
                    <div class="account-icon">
                        <i class="fas fa-{{ account.icon }}"></i>
                    </div>
                    <div class="account-info">
                        <div class="account-name">{{ account.name }}</div>
                        <div class="account-number">{{ account.number }}</div>
                    </div>
                    <span class="account-status {{ account.status }}">
                        <i class="fas fa-check-circle"></i>
                        {{ account.status|capitalize }}
                    </span>
                    <div class="account-actions">
                        <button class="account-action-btn" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="account-action-btn delete" title="Remove">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="card">
                <h2 class="card-title" style="margin-bottom: 16px;">Add New Account</h2>
                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <select class="form-select">
                        <option value="">Select type</option>
                        <option value="bank">Bank Account</option>
                        <option value="wallet">Digital Wallet</option>
                        <option value="card">Credit/Debit Card</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Bank/Wallet Name</label>
                    <input type="text" class="form-input" placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label class="form-label">Account Number</label>
                    <input type="text" class="form-input" placeholder="Enter account number">
                </div>
                <button class="btn btn-success btn-full">
                    <i class="fas fa-link"></i>
                    Link Account
                </button>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
