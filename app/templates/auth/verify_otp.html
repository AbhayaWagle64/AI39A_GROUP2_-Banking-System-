<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify OTP - ePaisa</title>
</head>
<body>
  <h2>Enter OTP</h2>
  <p>Please enter the OTP sent to your email or mobile.</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <ul>
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <form action="/verify-otp" method="POST">
    <label>Enter OTP:</label>
    <input type="text" name="otp" required placeholder="6-digit OTP">
    <br><br>
    <button type="submit">Verify OTP</button>
  </form>

  <p><a href="/forgot-password">Resend OTP</a></p>
</body>
</html>
