<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify OTP - ePaisa</title>
  <style>
      body { 
          font-family: Arial, sans-serif; 
          background: url("{{ url_for('static', filename='images/nepal_bg.png') }}") no-repeat center center fixed;
          background-size: cover;
          padding: 20px; 
          color: #333;
      }
      form {
          background: rgba(255,255,255,0.9);
          padding: 20px;
          border-radius: 8px;
          max-width: 400px;
      }
  </style>
</head>
<body>
  <h2>Enter OTP</h2>
  <p>Please enter the OTP sent to your email or mobile.</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <ul>
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <form action="/verify-otp" method="POST">
    <label>Enter OTP:</label>
    <input type="text" name="otp" required placeholder="6-digit OTP">
    <br><br>
    <button type="submit">Verify OTP</button>
  </form>

  <p><a href="/forgot-password">Resend OTP</a></p>
</body>
</html>
