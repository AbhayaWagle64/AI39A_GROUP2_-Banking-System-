<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: url("{{ url_for('static', filename='images/nepal_bg.png') }}") no-repeat center center fixed;
            background-size: cover;
            padding: 20px; 
            color: #333;
        }
        form {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <h2>Forgot Password</h2>
    <p>Please enter your registered mobile number or email to receive an OTP.</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    <form action="/forgot-password" method="POST">
        <div>
            <label for="identifier">Email or Mobile Number:</label>
            <input type="text" id="identifier" name="identifier" required placeholder="Enter Email or Mobile">
        </div>
        <br>
        <button type="submit">Send OTP</button>
    </form>
    <p><a href="/login">Back to Login</a></p>
</body>
</html>
