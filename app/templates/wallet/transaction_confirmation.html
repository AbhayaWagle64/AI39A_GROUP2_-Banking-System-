{% extends "base.html" %}

{% block title %}Confirm Transaction - ePaisa{% endblock %}

{% block content %}
<section class="panel">
    <h1>Confirm Transaction</h1>
    <div class="summary-card">
        <p><strong>Receiver:</strong> {{ receiver }}</p>
        <p><strong>Amount:</strong> Rs. {{ "%.2f"|format(amount) }}</p>
        {% if remarks %}<p><strong>Remarks:</strong> {{ remarks }}</p>{% endif %}
    </div>
    <div class="hero-actions">
        <a class="btn primary" href="{{ url_for('wallet.show_wallet') }}">Confirm</a>
        <a class="btn secondary" href="{{ url_for('wallet.show_wallet') }}">Cancel</a>
    </div>
</section>
{% endblock %}
