{% extends "base.html" %}

{% block title %}Edit Profile - ePaisa{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/profile_management.css') }}">
{% endblock %}

{% block content %}
<section class="panel">
    <h1>Edit Profile</h1>
    <form method="POST" enctype="multipart/form-data" class="simple-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" value="{{ user.full_name if user else '' }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email if user else '' }}" required>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ user.phone if user else '' }}" required>
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address">{{ user.address if user else '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Profile Image</label>
            <input type="file" name="profile_image" accept="image/*">
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="password" placeholder="Leave blank to keep current password">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm new password">
        </div>
        <button type="submit" class="btn primary">Save Changes</button>
    </form>
</section>
{% endblock %}
