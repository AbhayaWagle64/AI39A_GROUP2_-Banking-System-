{% extends "base.html" %}

{% block title %}Home - ePaisa{% endblock %}

{% block content %}
<section class="hero">
    <div>
        <h1>Smart digital banking in your pocket</h1>
        <p>Send money, pay bills, scan QR codes, and manage your wallet securely.</p>
        <div class="hero-actions">
            <a class="btn primary" href="{{ url_for('auth.register') }}">Create Account</a>
            <a class="btn secondary" href="{{ url_for('auth.login') }}">Login</a>
        </div>
    </div>
    <div class="hero-card">
        <h2>Wallet Balance</h2>
        <p class="balance">Rs. 0.00</p>
        <a class="btn primary" href="{{ url_for('wallet.show_wallet') }}">Open Wallet</a>
    </div>
</section>
{% endblock %}
