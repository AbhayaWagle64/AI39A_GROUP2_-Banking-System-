<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | ePaisa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #eee;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 28px;
      color: #4CAF50;
    }
    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    /* FLASH MESSAGES */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    .alert-danger  { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    .alert button  { background: none; border: none; font-size: 18px; cursor: pointer; color: inherit; }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #4CAF50; }

    .btn-login {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-login:hover { background: #45a049; }

    .links {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }
    .links a { color: #4CAF50; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="login-container">

    <!-- LOGO -->
    <div class="logo">
      <h1>💰 ePaisa</h1>
      <p>Your digital banking companion</p>
    </div>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
            <button onclick="this.parentElement.remove()">×</button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- LOGIN FORM -->
    <form method="POST" action="/login">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>

      <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="links">
      <a href="/forgot-password">Forgot password?</a>
      &nbsp;·&nbsp;
      <a href="/register">Create account</a>
    </div>

  </div>

</body>
</html>
