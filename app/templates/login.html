<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <script src="{{ url_for('static', filename='js/login.js') }}" defer></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>E-Paisa</h1>
            <p class="subtitle">Digital Wallet Login</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form id="loginForm" action="{{ url_for('auth.login') }}" method="POST">
                <div class="input-group">
                    <label for="email">Email or Username</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email" required>
                    <p id="emailError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-row">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" id="togglePassword" class="toggle-password">Show</button>
                    </div>
                    <p id="passwordError" class="error-message"></p>
                </div>

                <button type="submit" id="btnText">
                    Login <span id="btnLoader" class="hidden">Processing...</span>
                </button>
            </form>

            <p class="register-text">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}">Register</a>
            </p>
        </div>
    </div>

    <div id="toast" class="hidden"></div>
</body>
</html>
