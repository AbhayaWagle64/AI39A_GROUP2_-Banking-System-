<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Wallet - ePaisa</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    h2 { color: #333; }
    .balance-box { background: #4CAF50; color: white; padding: 20px; border-radius: 12px; font-size: 22px; margin-bottom: 30px; max-width: 700px; }
    .wallet-container { display: flex; gap: 20px; max-width: 700px; }
    .wallet-card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 24px; flex: 1; }
    .wallet-card h3 { margin-top: 0; font-size: 16px; color: #333; }
    label { display: block; font-size: 13px; color: #555; margin-top: 14px; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 18px; width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; color: white; }
    .btn-add { background: #4CAF50; }
    .btn-withdraw { background: #2196F3; }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; max-width: 700px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    .alert-danger { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    .alert button { background: none; border: none; font-size: 20px; cursor: pointer; color: inherit; width: auto; padding: 0; margin: 0; }
    .back-link { display: inline-block; margin-bottom: 20px; color: #555; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

  <a href="/dashboard" class="back-link">← Back to Dashboard</a>
  <h2>My Wallet</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
          {{ message }}
          <button onclick="this.parentElement.remove()">×</button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="balance-box">
    💰 Current Balance: Rs. {{ balance if balance else '0.00' }}
  </div>

  <div class="wallet-container">
    <div class="wallet-card">
      <h3>➕ Add Money</h3>
      <form method="POST" action="/wallet/add">
        <label>Amount (Rs.)</label>
        <input type="number" name="amount" min="1" placeholder="e.g. 500" required>
        <label>Payment Method</label>
        <select name="method">
          <option value="qr">QR Code</option>
          <option value="mobile">Mobile Number</option>
          <option value="wallet_id">Wallet ID</option>
        </select>
        <button type="submit" class="btn-add">Add Money</button>
      </form>
    </div>

    <div class="wallet-card">
      <h3>🏦 Withdraw Money</h3>
      <form method="POST" action="/wallet/withdraw">
        <label>Amount (Rs.)</label>
        <input type="number" name="amount" min="1" placeholder="e.g. 200" required>
        <label>Destination (Bank account or mobile)</label>
        <input type="text" name="destination" placeholder="e.g. 9801234567" required>
        <button type="submit" class="btn-withdraw">Withdraw</button>
      </form>
    </div>
  </div>

</body>
</html>
