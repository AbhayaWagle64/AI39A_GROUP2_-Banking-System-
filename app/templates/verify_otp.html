{% extends "base.html" %}

{% block title %}Verify OTP - ePaisa{% endblock %}

{% block content %}
<section class="panel">
    <h1>Verify OTP</h1>
    <form method="POST" class="simple-form">
        <div class="form-group">
            <label>OTP</label>
            <input type="text" name="otp" required>
        </div>
        <button type="submit" class="btn primary">Verify</button>
    </form>
</section>
{% endblock %}
