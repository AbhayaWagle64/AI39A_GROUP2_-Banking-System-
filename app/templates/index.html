<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - E-Paisa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        
        .home-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
            padding: 60px;
            text-align: center;
            max-width: 500px;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .home-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 36px;
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.3);
        }
        
        h1 {
            color: #1a1a2e;
            margin: 0 0 15px;
            font-size: 36px;
            font-weight: 700;
        }
        
        p {
            color: #666;
            margin: 0 0 30px;
            font-size: 16px;
        }
        
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.3);
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(17, 153, 142, 0.4);
        }
    </style>
</head>
<body>
    <div class="home-container">
        <div class="home-logo">
            <i class="fas fa-wallet"></i>
        </div>
        <h1>Welcome to E-Paisa</h1>
        <p>Your secure digital wallet for all your financial needs</p>
        <div>
            <a href="{{ url_for('main.login') }}" class="btn">Login</a>
            <a href="{{ url_for('main.register') }}" class="btn">Register</a>
        </div>
    </div>
</body>
</html>
