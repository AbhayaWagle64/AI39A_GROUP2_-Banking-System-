{% extends "base.html" %}

{% block title %}Bill Payment - ePaisa{% endblock %}

{% block content %}
<section class="panel">
    <h1>Pay Bills</h1>
    <form method="POST" class="simple-form">
        <div class="form-group">
            <label>Biller</label>
            <input type="text" name="biller" placeholder="Electricity, water, internet..." required>
        </div>
        <div class="form-group">
            <label>Amount</label>
            <input type="number" step="0.01" name="amount" required>
        </div>
        <button type="submit" class="btn primary">Continue</button>
    </form>
</section>
{% endblock %}
