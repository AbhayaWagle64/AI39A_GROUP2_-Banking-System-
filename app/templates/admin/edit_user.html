{% extends "admin/base.html" %}

{% block title %}Edit User — Admin{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}

<div class="dashboard-wrap" style="padding:24px;">

    <h1 class="dashboard-title" style="margin:0 0 16px;">Edit User</h1>
    <p style="color:var(--text-secondary); margin-bottom:24px;">Update user details</p>

    <div class="card" style="max-width:600px;">
        <form method="POST" action="{{ url_for('admin.edit_user', username=user.username) }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="input" value="{{ user.username }}" readonly>
            </div>
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="input" value="{{ user.full_name or '' }}" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="input" value="{{ user.email or '' }}" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" class="input" value="{{ user.phone or '' }}">
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" class="input" value="{{ user.address or '' }}">
            </div>
            <div class="form-group">
                <label for="balance">Balance (₹)</label>
                <input type="number" id="balance" name="balance" class="input" value="{{ user.balance or '0' }}" step="0.01" min="0">
            </div>
            <div class="form-actions" style="margin-top:20px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const logoutLinks = document.querySelectorAll('.logout-link');
    const logoutModal = document.getElementById('logoutModal');
    const modalCancel = document.getElementById('modalCancel');

    logoutLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            logoutModal.classList.add('active');
        });
    });

    if (modalCancel) {
        modalCancel.addEventListener('click', () => {
            logoutModal.classList.remove('active');
        });
    }

    if (logoutModal) {
        logoutModal.addEventListener('click', (e) => {
            if (e.target === logoutModal) {
                logoutModal.classList.remove('active');
            }
        });
    }
});
</script>
