<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Admin Panel — ePaisa">

    <title>
        {% block title %}
            Admin Panel — ePaisa
        {% endblock %}
    </title>

    <link rel="icon" href="{{ url_for('static', filename='images/logo.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

    {% block css %}
    {% endblock %}
</head>

<body>
    <!-- Admin navbar -->
    <nav class="navbar admin-navbar">

        <span class="logo-text">ePaisa Admin</span>

        <ul class="nav-links">

            <li>
                <a href="{{ url_for('admin.admin_dashboard') }}"
                    class="{% if request.path == '/admin/dashboard' %}active{% endif %}">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin.admin_wallet') }}"
                    class="{% if request.path == '/admin/wallet' %}active{% endif %}">
                    Wallet
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin.admin_report') }}"
                    class="{% if request.path == '/admin/report' %}active{% endif %}">
                    Generate Report
                </a>
            </li>

            <li>
                <a href="{{ url_for('admin.admin_transactions') }}"
                    class="{% if request.path == '/admin/transactions' %}active{% endif %}">
                    Transactions
                </a>
            </li>

            <li>
                <a href="#" class="logout-link">Logout</a>
            </li>

        </ul>

    </nav>

    <main class="page-enter">

        {% block content %}
        {% endblock %}

    </main>

    {% block js %}
    {% endblock %}

    <div class="modal-overlay" id="logoutModal">
        <div class="modal-box">
            <div class="modal-icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </div>
            <h3 class="modal-title">Are you sure you want to logout?</h3>
            <p class="modal-subtitle">You will be redirected to the login page and your session will be closed.</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancel">No, Stay</button>
                <form id="logoutForm" action="/logout" method="POST" style="display:inline;">
                    <button type="submit" class="btn-confirm">Yes, Logout</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
