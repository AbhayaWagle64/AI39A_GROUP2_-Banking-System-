<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <script src="{{ url_for('static', filename='js/register.js') }}" defer></script>
</head>
<body>
    <div class="register-page">
        <div class="register-box">
            <h1>Create Account</h1>
            <p class="subtitle">Join ePaisa digital wallet</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form id="registerForm" action="{{ url_for('auth.register') }}" method="POST">
                <div class="input-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Full name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email address" required>
                    <p id="emailError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" placeholder="98XXXXXXXX" required>
                    <p id="phoneError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-row">
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <button type="button" id="togglePassword" class="toggle-password">Show</button>
                    </div>
                    <div class="password-strength"><div id="strengthBar" class="password-strength-bar"></div></div>
                    <p id="strengthText" class="small-text">Password strength</p>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                    <p id="confirmError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="pan">PAN Number</label>
                    <input type="text" id="pan" name="pan" placeholder="Optional">
                </div>

                <div class="input-group">
                    <label for="referral">Referral Code</label>
                    <input type="text" id="referral" name="referral" placeholder="Optional">
                </div>

                <button type="submit" id="btnText">
                    Register <span id="btnLoader" class="hidden">Processing...</span>
                </button>
            </form>

            <p class="register-text">
                Already have an account?
                <a href="{{ url_for('auth.login') }}">Login</a>
            </p>
        </div>
    </div>

    <div id="toast" class="hidden"></div>
</body>
</html>
