<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Paisa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        
        .register-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
            padding: 48px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .register-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
            font-size: 32px;
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.3);
        }
        
        .register-header h1 {
            color: #1a1a2e;
            margin: 0 0 12px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .register-header p {
            color: #666;
            margin: 0;
            font-size: 15px;
            font-weight: 400;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            color: #1a1a2e;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
            letter-spacing: 0.3px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
            background: #fafafa;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #11998e;
            background: white;
            box-shadow: 0 0 0 4px rgba(17, 153, 142, 0.1);
        }
        
        .form-group input::placeholder {
            color: #aaa;
        }
        
        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.3);
            letter-spacing: 0.5px;
        }
        
        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(17, 153, 142, 0.4);
        }
        
        .register-btn:active {
            transform: translateY(-1px);
        }
        
        .register-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 24px;
            border-top: 2px solid #f0f0f0;
        }
        
        .register-footer p {
            color: #666;
            margin: 0;
            font-size: 15px;
        }
        
        .register-footer a {
            color: #11998e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .register-footer a:hover {
            color: #38ef7d;
            text-decoration: underline;
        }
        
        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .alert-danger {
            background: linear-gradient(135deg, #fee 0%, #fcc 100%);
            color: #c33;
            border: 2px solid #f99;
        }
        
        .alert-success {
            background: linear-gradient(135deg, #efe 0%, #cfc 100%);
            color: #2d8a2d;
            border: 2px solid #9f9;
        }
        
        .password-requirements {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="register-logo">
                <i class="fas fa-wallet"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join E-Paisa today</p>
        </div>
        
        
                    <div class="alert alert-{{ category }}"> Your mobile number will be your USER ID</div>
                
        <form method="POST" action="{{ url_for('main.register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
                <div class="password-requirements">
                    Minimum 6 characters recommended
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="register-btn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        
        <div class="register-footer">
            <p>Already have an account? <a href="{{ url_for('main.login') }}">Login here</a></p>
        </div>
    </div>
</body>
</html>
