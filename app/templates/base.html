<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Paisa{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>E-Paisa</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('main.home') }}">Home</a></li>
                {% if session.get('user_id') %}
                <li><a href="{{ url_for('main.wallet') }}">Wallet</a></li>
                <li><a href="{{ url_for('main.add_money') }}">Add Money</a></li>
                <li><a href="{{ url_for('main.withdraw_money') }}">Withdraw</a></li>
                <li><a href="{{ url_for('main.linked_accounts') }}">Accounts</a></li>
                <li><a href="{{ url_for('main.logout') }}">Logout</a></li>
                {% else %}
                <li><a href="{{ url_for('main.login') }}">Login</a></li>
                <li><a href="{{ url_for('main.register') }}">Register</a></li>
                {% endif %}
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        <!-- Content will be injected here -->
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 E-Paisa. All rights reserved.</p>
    </footer>
</body>
</html>
