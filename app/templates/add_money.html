<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Money - E-Paisa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <i class="fas fa-wallet"></i>
                </div>
                <span class="sidebar-logo-text">E-Paisa</span>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('main.wallet') }}" class="sidebar-nav-item">
                    <i class="fas fa-home"></i>
                    <span>Wallet</span>
                </a>
                <a href="{{ url_for('main.add_money') }}" class="sidebar-nav-item active">
                    <i class="fas fa-plus-circle"></i>
                    <span>Add Money</span>
                </a>
                <a href="{{ url_for('main.withdraw_money') }}" class="sidebar-nav-item">
                    <i class="fas fa-minus-circle"></i>
                    <span>Withdraw</span>
                </a>
                <a href="{{ url_for('main.linked_accounts_page') }}" class="sidebar-nav-item">
                    <i class="fas fa-university"></i>
                    <span>Accounts</span>
                </a>
                <a href="{{ url_for('main.wallet') }}" class="sidebar-nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Summary</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Add Money</h1>
                    <p class="page-subtitle">Load funds to your wallet</p>
                </div>
            </div>

            <div class="card">
                <div class="form-group">
                    <label class="form-label">Amount (₹)</label>
                    <input type="number" class="form-input" id="amount" placeholder="Enter amount" min="1">
                </div>

                <div class="form-group">
                    <label class="form-label">Quick Amount</label>
                    <div class="quick-amounts">
                        <button class="quick-amount-btn" onclick="selectAmount(500)">₹500</button>
                        <button class="quick-amount-btn" onclick="selectAmount(1000)">₹1,000</button>
                        <button class="quick-amount-btn" onclick="selectAmount(5000)">₹5,000</button>
                        <button class="quick-amount-btn" onclick="selectAmount(10000)">₹10,000</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Payment Method</label>
                    <select class="form-select" id="payment-method">
                        <option value="">Select payment method</option>
                        {% for account in linked_accounts %}
                        <option value="{{ account.name }}">{{ account.name }} - {{ account.number }}</option>
                        {% endfor %}
                        <option value="card">Credit/Debit Card</option>
                        <option value="upi">UPI Payment</option>
                    </select>
                </div>

                <div class="security-badge">
                    <i class="fas fa-shield-alt"></i>
                    <span>Secure Transaction - 256-bit SSL Encrypted</span>
                </div>

                <button class="btn btn-success btn-full" style="margin-top: 24px;">
                    <i class="fas fa-plus-circle"></i>
                    Add Money
                </button>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
