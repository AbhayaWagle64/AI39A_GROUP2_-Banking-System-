<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa | Send Money</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/sendmoney.css') }}">
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-md">

        <div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">

            <div class="flex items-center gap-3">

                <div class="w-12 h-12 rounded-xl bg-gradient-to-r from-blue-600 to-green-500 flex items-center justify-center text-white text-xl">
                    <i class="fa-solid fa-wallet"></i>
                </div>

                <div>
                    <h1 class="font-bold text-xl">E-Paisa</h1>
                    <p class="text-sm text-gray-500">
                        Secure Digital Wallet
                    </p>
                </div>

            </div>

            <div class="text-green-600 font-semibold">
                Balance: Rs. 25,000
            </div>

        </div>

    </nav>

    <!-- Main -->
    <main class="max-w-4xl mx-auto px-5 py-12">

        <div class="bg-white shadow-xl rounded-3xl p-8">

            <!-- Header -->
            <div class="text-center mb-10">

                <div class="mx-auto mb-5 w-20 h-20 rounded-full bg-gradient-to-r from-blue-600 to-green-500 flex items-center justify-center text-white text-3xl">
                    <i class="fa-solid fa-paper-plane"></i>
                </div>

                <h2 class="text-3xl font-bold mb-2">
                    Send Money
                </h2>

                <p class="text-gray-500">
                    Transfer funds instantly and securely
                </p>

            </div>

            <!-- Form -->
            <form id="sendMoneyForm"
                  method="POST"
                  action="/send-money"
                  class="space-y-6">

                <!-- Receiver -->
                <div>

                    <label class="block mb-2 font-semibold">
                        Receiver Number / Wallet ID
                    </label>

                    <div class="relative">

                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

                        <input
                            type="text"
                            name="receiver"
                            id="receiver"
                            placeholder="98XXXXXXXX"
                            class="input-field pl-12"
                            required
                        >

                    </div>

                    <p id="receiverError" class="error-message"></p>

                </div>

                <!-- Amount -->
                <div>

                    <label class="block mb-2 font-semibold">
                        Amount (Rs.)
                    </label>

                    <div class="relative">

                        <i class="fa-solid fa-money-bill-wave absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

                        <input
                            type="number"
                            name="amount"
                            id="amount"
                            placeholder="Enter amount"
                            class="input-field pl-12"
                            required
                        >

                    </div>

                    <p id="amountError" class="error-message"></p>

                </div>

                <!-- Remarks -->
                <div>

                    <label class="block mb-2 font-semibold">
                        Remarks
                    </label>

                    <textarea
                        name="remarks"
                        rows="4"
                        placeholder="Optional message"
                        class="input-field resize-none"
                    ></textarea>

                </div>

                <!-- Confirmation -->
                <div class="bg-blue-50 border border-blue-200 rounded-2xl p-5">

                    <div class="flex items-center gap-3 mb-3">

                        <i class="fa-solid fa-circle-info text-blue-600"></i>

                        <h3 class="font-semibold text-blue-700">
                            Transaction Summary
                        </h3>

                    </div>

                    <div class="space-y-2 text-sm text-gray-600">

                        <p>
                            Service Charge:
                            <span class="font-semibold">
                                Rs. 5
                            </span>
                        </p>

                        <p>
                            Transfer Type:
                            <span class="font-semibold">
                                Instant Transfer
                            </span>
                        </p>

                    </div>

                </div>

                <!-- Button -->
                <button
                    type="submit"
                    class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-green-500 text-white font-bold text-lg hover:scale-[1.02] transition-all duration-300 shadow-xl">

                    <span id="btnText">
                        Send Money
                    </span>

                    <span id="btnLoader" class="hidden">
                        <i class="fa-solid fa-spinner animate-spin"></i>
                        Processing...
                    </span>

                </button>

            </form>

        </div>

    </main>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/sendmoney.js') }}"></script>

</body>
</html>
