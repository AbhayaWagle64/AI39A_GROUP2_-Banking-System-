{% extends "base.html" %}

{% block title %}Receive Money - ePaisa{% endblock %}

{% block content %}
<section class="panel">
    <h1>Receive Money</h1>
    <form method="POST" class="simple-form">
        <div class="form-group">
            <label>Sender Email</label>
            <input type="email" name="sender_email" required>
        </div>
        <div class="form-group">
            <label>Amount</label>
            <input type="number" step="0.01" name="amount" required>
        </div>
        <button type="submit" class="btn primary">Send Payment Request</button>
    </form>
</section>
{% endblock %}
