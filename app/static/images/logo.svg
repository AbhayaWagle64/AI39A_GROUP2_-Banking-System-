<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="walletGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="50%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#1a7a3a"/>
    </linearGradient>
    <linearGradient id="stripeGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000030"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wallet Body -->
  <rect x="10" y="10" width="100" height="80" rx="14" fill="url(#walletGrad)" filter="url(#shadow)"/>

  <!-- Wallet Top Flap -->
  <path d="M10 28 Q10 10 60 10 Q110 10 110 28 L110 46 Q110 58 60 58 Q10 58 10 46 Z" fill="url(#walletGrad)" opacity=".85"/>

  <!-- Flap Fold Line -->
  <path d="M10 36 Q60 36 110 36" stroke="#ffffff18" stroke-width="1.5" fill="none"/>

  <!-- Coin Slit -->
  <rect x="45" y="20" width="30" height="4" rx="2" fill="#ffffff20"/>

  <!-- Golden Stripe -->
  <rect x="10" y="52" width="100" height="6" rx="3" fill="url(#stripeGrad)" opacity=".9"/>

  <!-- Card peeking out -->
  <rect x="25" y="25" width="35" height="25" rx="4" fill="#ffffff25" stroke="#ffffff30" stroke-width="1"/>
  <rect x="32" y="31" width="20" height="2" rx="1" fill="#ffffff30"/>
  <rect x="32" y="36" width="22" height="2" rx="1" fill="#ffffff25"/>
  <rect x="32" y="41" width="18" height="2" rx="1" fill="#ffffff20"/>

  <!-- Diamond Gems -->
  <polygon points="54,60 58,55 62,60 58,65" fill="#f1c40f" opacity=".9" filter="url(#glow)"/>
  <polygon points="62,60 66,55 70,60 66,65" fill="#e74c3c" opacity=".85" filter="url(#glow)"/>
  <polygon points="70,60 74,55 78,60 74,65" fill="#3498db" opacity=".85" filter="url(#glow)"/>

  <!-- Sparkle Stars -->
