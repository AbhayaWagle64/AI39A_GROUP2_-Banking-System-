  <circle cx="85" cy="28" r="1.2" fill="white" opacity=".6"/>
  <circle cx="90" cy="90" r="1.8" fill="white" opacity=".5"/>
  <circle cx="20" cy="85" r="1.4" fill="white" opacity=".5"/>

