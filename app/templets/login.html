{% extends "wallet/base.html" %}

{% block content %}

<h2>Login</h2>

{% if error %}
    <div id="form-error" class="small" style="color:#b00020;margin-bottom:8px;display:block">
        {{ error }}
    </div>
{% else %}
    <div id="form-error" class="small" style="color:#b00020;margin-bottom:8px;display:none"></div>
{% endif %}

<form method="POST" class="auth-form" novalidate>

    <label for="username" class="small">Phone number</label>
    <input
    id="username"
    type="tel"
    name="phone"
    placeholder="98XXXXXXXX"
    pattern="[0-9]{8,15}"
    required>

    <label for="password" class="small">Password</label>
    <input
    id="password"
    type="password"
    name="password"
    placeholder="Password"
    required>

    <button type="submit">
        Login
    </button>

</form>

<div style="margin-top:12px">
    <a href="/forgot-password">Forgot Password?</a>
    &nbsp;·&nbsp;
    <a href="/register">Create account</a>
</div>

{% endblock %}
