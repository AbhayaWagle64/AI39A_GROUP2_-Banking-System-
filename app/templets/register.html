{% extends "wallet/base.html" %}

{% block content %}

<h2>Create Wallet</h2>

{% if error %}
<div id="form-error" class="small" style="color:#b00020;margin-bottom:8px;display:block">
    {{ error }}
</div>
{% else %}
<div id="form-error" class="small" style="color:#b00020;margin-bottom:8px;display:none"></div>
{% endif %}

<form method="POST" class="auth-form" novalidate>

    <label class="small" for="name">Full name</label>
    <input
    id="name"
    type="text"
    name="name"
    placeholder="Full Name"
    required>

    <label class="small" for="phone">Phone number</label>
    <input
    id="phone"
    type="tel"
    name="phone"
    placeholder="98XXXXXXXX"
    required>

    <label class="small" for="email">Email (optional)</label>
    <input
    id="email"
    type="email"
    name="email"
    placeholder="you@example.com">

    <label class="small" for="password">Password</label>
    <input
    id="password"
    type="password"
    name="password"
    placeholder="Password"
    required>

    <button type="submit">
        Create Wallet
    </button>

</form>

<div style="margin-top:12px">
    Already have an account? <a href="/login">Login</a>
</div>

{% endblock %}
