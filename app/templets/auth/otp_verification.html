{% extends "wallet/base.html" %}

{% block content %}

<h2>OTP Verification</h2>

<form method="POST">

    <input
    type="text"
    name="otp"
    placeholder="Enter OTP">

    <button type="submit">

        Verify OTP

    </button>

</form>

<form method="POST"
action="/resend-otp">

    <button type="submit">

        Resend OTP

    </button>

</form>

{% endblock %}
