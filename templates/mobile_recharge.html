<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa | Mobile Recharge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <nav class="border-b border-white/10 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 font-extrabold px-3 py-1 rounded-xl text-xl font-mono">eP</span>
                <span class="text-xl font-bold text-white">Recharge</span>
            </div>
            <a href="/dashboard" class="text-xs font-bold text-emerald-400 hover:bg-emerald-500/10 px-3 py-2 rounded-xl transition">Dashboard</a>
        </div>
    </nav>
    
    <main class="flex-grow max-w-2xl mx-auto px-4 py-8 w-full">
        <!-- Network Selection -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <button onclick="selectNetwork('ncell')" class="network-btn bg-slate-900/50 border border-white/5 p-4 rounded-xl hover:border-purple-500/50 transition text-center">
                <i class="fa-solid fa-signal text-purple-400 text-2xl mb-2"></i>
                <p class="text-xs font-bold text-white">Ncell</p>
            </button>
            <button onclick="selectNetwork('ntc')" class="network-btn bg-slate-900/50 border border-white/5 p-4 rounded-xl hover:border-blue-500/50 transition text-center">
                <i class="fa-solid fa-tower-cell text-blue-400 text-2xl mb-2"></i>
                <p class="text-xs font-bold text-white">NTC</p>
            </button>
            <button onclick="selectNetwork('smartcell')" class="network-btn bg-slate-900/50 border border-white/5 p-4 rounded-xl hover:border-green-500/50 transition text-center">
                <i class="fa-solid fa-broadcast-tower text-green-400 text-2xl mb-2"></i>
                <p class="text-xs font-bold text-white">Smart</p>
            </button>
        </div>
        
        <!-- Recharge Form -->
        <div id="rechargeForm" class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl hidden">
            <h4 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-mobile-screen mr-2 text-emerald-400"></i>Mobile Recharge</h4>
            
            <form class="space-y-4" onsubmit="doRecharge(event)">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Phone Number</label>
                    <input type="text" id="rechargePhone" placeholder="98XXXXXXXX" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Amount</label>
                    <div class="grid grid-cols-3 gap-2 mb-2">
                        <button type="button" onclick="setAmount(50)" class="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold py-2 rounded-lg transition">Rs. 50</button>
                        <button type="button" onclick="setAmount(100)" class="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold py-2 rounded-lg transition">Rs. 100</button>
                        <button type="button" onclick="setAmount(500)" class="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold py-2 rounded-lg transition">Rs. 500</button>
                    </div>
                    <input type="number" id="rechargeAmount" step="0.01" placeholder="Or enter custom amount" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 rounded-xl transition">
                    Recharge Now
                </button>
            </form>
        </div>
        
        <!-- Recent Recharges -->
        <div class="mt-6 bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl">
            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Recent Recharges</h4>
            <div id="recentRecharges" class="space-y-2">
                <p class="text-slate-500 text-sm">No recent recharges</p>
            </div>
        </div>
    </main>
    
    <script>
        let selectedNetwork = '';
        
        function selectNetwork(network) {
            selectedNetwork = network;
            document.querySelectorAll('.network-btn').forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-500/10');
            });
            event.target.closest('.network-btn').classList.add('border-emerald-500', 'bg-emerald-500/10');
            document.getElementById('rechargeForm').classList.remove('hidden');
        }
        
        function setAmount(amt) {
            document.getElementById('rechargeAmount').value = amt;
        }
        
        async function doRecharge(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('phone', document.getElementById('rechargePhone').value);
            formData.append('amount', document.getElementById('rechargeAmount').value);
            formData.append('purpose', `Mobile Recharge: ${selectedNetwork}`);
            
            try {
                const r = await fetch('/api/send-money', { method: 'POST', body: formData });
                const d = await r.json();
                if (r.ok) {
                    alert(`Recharge of Rs. ${document.getElementById('rechargeAmount').value} successful!`);
                    window.location.href = '/dashboard';
                } else {
                    alert('Error: ' + d.error);
                }
            } catch (err) {
                alert('Recharge failed: ' + err.message);
            }
        }
    </script>
</body>
</html>
