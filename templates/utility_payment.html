<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa | Utility Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <nav class="border-b border-white/10 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 font-extrabold px-3 py-1 rounded-xl text-xl font-mono">eP</span>
                <span class="text-xl font-bold text-white">Utility Pay</span>
            </div>
            <a href="/dashboard" class="text-xs font-bold text-emerald-400 hover:bg-emerald-500/10 px-3 py-2 rounded-xl transition">Dashboard</a>
        </div>
    </nav>
    
    <main class="flex-grow max-w-2xl mx-auto px-4 py-8 w-full">
        <div class="grid gap-4 mb-6">
            <!-- Electricity -->
            <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-5 rounded-2xl shadow-xl hover:border-amber-500/30 transition cursor-pointer" onclick="selectUtility('electricity')">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-amber-500/10 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-bolt text-amber-400 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-white">Electricity</h4>
                        <p class="text-slate-400 text-xs">NEA, Kathmandu Electricity</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-500 ml-auto"></i>
                </div>
            </div>
            
            <!-- Water -->
            <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-5 rounded-2xl shadow-xl hover:border-blue-500/30 transition cursor-pointer" onclick="selectUtility('water')">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-droplet text-blue-400 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-white">Water</h4>
                        <p class="text-slate-400 text-xs">KUKL, Melamchi Water</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-500 ml-auto"></i>
                </div>
            </div>
            
            <!-- Internet -->
            <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-5 rounded-2xl shadow-xl hover:border-emerald-500/30 transition cursor-pointer" onclick="selectUtility('internet')">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-wifi text-emerald-400 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-white">Internet</h4>
                        <p class="text-slate-400 text-xs">WorldLink, Vianet, CG Net</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-500 ml-auto"></i>
                </div>
            </div>
            
            <!-- TV -->
            <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-5 rounded-2xl shadow-xl hover:border-rose-500/30 transition cursor-pointer" onclick="selectUtility('tv')">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-rose-500/10 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-tv text-rose-400 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-white">Cable TV</h4>
                        <p class="text-slate-400 text-xs">DishHome, Sim TV</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-500 ml-auto"></i>
                </div>
            </div>
        </div>
        
        <!-- Payment Form -->
        <div id="utilityForm" class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl hidden">
            <h4 class="text-lg font-bold text-white mb-4" id="utilityTitle">Pay Bill</h4>
            <form class="space-y-4" onsubmit="payUtility(event)">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Customer ID / SC Number</label>
                    <input type="text" id="customerId" placeholder="Enter customer ID" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Amount (NPR)</label>
                    <input type="number" id="utilityAmount" step="0.01" placeholder="0.00" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 rounded-xl transition">
                    Pay Bill
                </button>
            </form>
        </div>
    </main>
    
    <script>
        let currentUtility = '';
        
        function selectUtility(type) {
            currentUtility = type;
            document.getElementById('utilityForm').classList.remove('hidden');
            const titles = {
                electricity: 'Pay Electricity Bill',
                water: 'Pay Water Bill',
                internet: 'Pay Internet Bill',
                tv: 'Pay TV Bill'
            };
            document.getElementById('utilityTitle').textContent = titles[type];
        }
        
        async function payUtility(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('amount', document.getElementById('utilityAmount').value);
            formData.append('purpose', `Utility: ${currentUtility}`);
            
            try {
                const r = await fetch('/api/load-funds', { method: 'POST', body: formData });
                const d = await r.json();
                if (r.ok) {
                    alert(`${currentUtility} bill paid successfully!`);
                    window.location.href = '/dashboard';
                } else {
                    alert('Error: ' + d.error);
                }
            } catch (err) {
                alert('Payment failed: ' + err.message);
            }
        }
    </script>
</body>
</html>
