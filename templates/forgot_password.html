<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <nav class="border-b border-white/10 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 font-extrabold px-3 py-1 rounded-xl text-xl font-mono">eP</span>
                <span class="text-xl font-bold text-white">E-Paisa</span>
            </div>
            <a href="/login" class="text-xs font-bold text-emerald-400 hover:bg-emerald-500/10 px-3 py-2 rounded-xl transition">Back to Login</a>
        </div>
    </nav>
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-amber-500/10 blur-[120px] rounded-full"></div>
        </div>
        <div class="w-full max-w-md bg-slate-900/80 border border-white/10 backdrop-blur-xl p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-500/10 border border-amber-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-key text-amber-400 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Reset Password</h2>
                <p class="text-slate-400 text-sm mt-1">Enter your email to receive a reset code</p>
            </div>
            
            <!-- ONLY show reset code AFTER form submission (when flash message exists) -->
            {% if session.get('reset_token') and messages %}
            <div class="mb-6 p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-center">
                <p class="text-xs text-emerald-400 font-semibold uppercase tracking-wider mb-2">Your Reset Code</p>
                <p class="text-4xl font-bold font-mono text-emerald-400 tracking-widest">{{ session.get('reset_token') }}</p>
                <p class="text-xs text-slate-400 mt-2">Enter this on the next page</p>
            </div>
            {% endif %}
            
            <form action="/forgot-password" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-slate-500 text-sm"></i>
                        <input type="email" name="email" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-amber-500 focus:outline-none transition-all" placeholder="name@example.com">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-amber-500/20">
                    <i class="fa-solid fa-paper-plane mr-2"></i>Send Reset Code
                </button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-slate-500 text-xs">Remember your password? <a href="/login" class="text-emerald-400 hover:text-emerald-300 font-semibold transition">Sign In</a></p>
            </div>
        </div>
    </main>
</body>
</html>
