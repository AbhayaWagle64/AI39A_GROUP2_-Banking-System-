<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa | QR Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <nav class="border-b border-white/10 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 font-extrabold px-3 py-1 rounded-xl text-xl font-mono">eP</span>
                <span class="text-xl font-bold text-white">QR Payment</span>
            </div>
            <a href="/dashboard" class="text-xs font-bold text-emerald-400 hover:bg-emerald-500/10 px-3 py-2 rounded-xl transition">Dashboard</a>
        </div>
    </nav>
    
    <main class="flex-grow max-w-4xl mx-auto px-4 py-8 w-full">
        <div class="grid md:grid-cols-2 gap-6">
            <!-- Generate QR -->
            <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl">
                <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-qrcode mr-2 text-emerald-400"></i>Generate QR</h3>
                <p class="text-slate-400 text-sm mb-4">Create a QR code for others to scan and pay you</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Amount (NPR)</label>
                        <input type="number" id="qrAmount" step="0.01" placeholder="0.00" 
                               class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Note (Optional)</label>
                        <input type="text" id="qrNote" placeholder="Payment for..." 
                               class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                    </div>
                    <button onclick="generateQR()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 rounded-xl transition">
                        Generate QR Code
                    </button>
                </div>
                
                <div id="qrResult" class="mt-6 text-center hidden">
                    <div id="qrcode" class="inline-block p-4 bg-white rounded-xl"></div>
                    <p class="text-slate-400 text-xs mt-2">Scan to pay</p>
                    <p class="text-emerald-400 font-mono text-sm mt-1" id="qrAmountDisplay"></p>
                </div>
            </div>
            
            <!-- Scan QR -->
            <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl">
                <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-camera mr-2 text-blue-400"></i>Scan & Pay</h3>
                <p class="text-slate-400 text-sm mb-4">Scan a QR code to make payment</p>
                
                <div class="border-2 border-dashed border-white/10 rounded-xl p-8 text-center hover:border-emerald-500/50 transition cursor-pointer" onclick="document.getElementById('qrInput').click()">
                    <i class="fa-solid fa-camera text-4xl text-slate-500 mb-3"></i>
                    <p class="text-slate-400 text-sm">Click to upload QR image</p>
                    <input type="file" id="qrInput" accept="image/*" class="hidden" onchange="scanQR(this)">
                </div>
                
                <div id="scanResult" class="mt-4 hidden">
                    <div class="bg-slate-950/50 border border-white/5 rounded-xl p-4">
                        <p class="text-xs text-slate-400">Detected Payment</p>
                        <p class="text-white font-mono text-sm mt-1" id="scanData"></p>
                        <button onclick="confirmQRPayment()" class="mt-3 w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-2 rounded-xl transition text-sm">
                            Confirm Payment
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        let currentQRData = null;
        
        function generateQR() {
            const amount = document.getElementById('qrAmount').value;
            const note = document.getElementById('qrNote').value;
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            const data = JSON.stringify({
                type: 'epaisa_payment',
                amount: amount,
                note: note,
                timestamp: new Date().toISOString()
            });
            
            document.getElementById('qrResult').classList.remove('hidden');
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('qrAmountDisplay').textContent = `Rs. ${parseFloat(amount).toFixed(2)}`;
            
            new QRCode(document.getElementById('qrcode'), {
                text: data,
                width: 200,
                height: 200,
                colorDark: '#000000',
                colorLight: '#ffffff'
            });
        }
        
        function scanQR(input) {
            // Simulated QR scan for demo
            const file = input.files[0];
            if (!file) return;
            
            // In real implementation, use QR scanner library
            // For demo, simulate successful scan
            currentQRData = {
                type: 'epaisa_payment',
                amount: '100.00',
                note: 'Demo payment'
            };
            
            document.getElementById('scanResult').classList.remove('hidden');
            document.getElementById('scanData').textContent = `Amount: Rs. ${currentQRData.amount} - ${currentQRData.note}`;
        }
        
        function confirmQRPayment() {
            if (!currentQRData) return;
            alert(`Payment of Rs. ${currentQRData.amount} confirmed!`);
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
