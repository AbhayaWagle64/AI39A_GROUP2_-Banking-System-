<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa | Saved Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <nav class="border-b border-white/10 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 font-extrabold px-3 py-1 rounded-xl text-xl font-mono">eP</span>
                <span class="text-xl font-bold text-white">Saved Payments</span>
            </div>
            <a href="/dashboard" class="text-xs font-bold text-emerald-400 hover:bg-emerald-500/10 px-3 py-2 rounded-xl transition">Dashboard</a>
        </div>
    </nav>
    
    <main class="flex-grow max-w-2xl mx-auto px-4 py-8 w-full">
        <!-- Add New -->
        <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl mb-6">
            <h4 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-bookmark mr-2 text-emerald-400"></i>Save New Recipient</h4>
            <form id="saveForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Name</label>
                    <input type="text" id="saveName" placeholder="e.g. Mom, Electrician" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Phone / Account</label>
                    <input type="text" id="savePhone" placeholder="98XXXXXXXX or account number" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Type</label>
                    <select id="saveType" class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                        <option value="person">Person</option>
                        <option value="merchant">Merchant</option>
                        <option value="utility">Utility</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 rounded-xl transition">
                    Save Recipient
                </button>
            </form>
        </div>
        
        <!-- Saved List -->
        <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl">
            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Saved Recipients</h4>
            <div id="savedList" class="space-y-3">
                <!-- Demo entries -->
                <div class="flex items-center justify-between p-3 bg-slate-950/30 rounded-xl hover:bg-slate-950/50 transition cursor-pointer" onclick="quickPay('9801234567', 'Mom')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-emerald-500/10 flex items-center justify-center">
                            <i class="fa-solid fa-user text-emerald-400"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-white">Mom</p>
                            <p class="text-xs text-slate-400">9801234567 • Person</p>
                        </div>
                    </div>
                    <button class="text-emerald-400 hover:text-emerald-300 text-xs font-bold">Pay</button>
                </div>
                
                <div class="flex items-center justify-between p-3 bg-slate-950/30 rounded-xl hover:bg-slate-950/50 transition cursor-pointer" onclick="quickPay('9876543210', 'Electrician Ram')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-amber-500/10 flex items-center justify-center">
                            <i class="fa-solid fa-briefcase text-amber-400"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-white">Electrician Ram</p>
                            <p class="text-xs text-slate-400">9876543210 • Merchant</p>
                        </div>
                    </div>
                    <button class="text-emerald-400 hover:text-emerald-300 text-xs font-bold">Pay</button>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        document.getElementById('saveForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('saveName').value;
            const phone = document.getElementById('savePhone').value;
            const type = document.getElementById('saveType').value;
            
            // Add to list (in real app, save to database)
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between p-3 bg-slate-950/30 rounded-xl hover:bg-slate-950/50 transition cursor-pointer';
            div.onclick = () => quickPay(phone, name);
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-emerald-500/10 flex items-center justify-center">
                        <i class="fa-solid fa-user text-emerald-400"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-white">${name}</p>
                        <p class="text-xs text-slate-400">${phone} • ${type}</p>
                    </div>
                </div>
                <button class="text-emerald-400 hover:text-emerald-300 text-xs font-bold">Pay</button>
            `;
            document.getElementById('savedList').appendChild(div);
            
            // Clear form
            document.getElementById('saveForm').reset();
            alert('Recipient saved!');
        });
        
        function quickPay(phone, name) {
            sessionStorage.setItem('quickPayPhone', phone);
            sessionStorage.setItem('quickPayName', name);
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
