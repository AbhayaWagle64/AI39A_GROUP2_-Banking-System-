<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <nav class="border-b border-white/10 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 font-extrabold px-3 py-1 rounded-xl text-xl font-mono">eP</span>
                <span class="text-xl font-bold text-white">E-Paisa</span>
            </div>
            <a href="/register" class="text-xs font-bold text-emerald-400 hover:bg-emerald-500/10 px-3 py-2 rounded-xl transition">Create Account</a>
        </div>
    </nav>
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-emerald-500/10 blur-[120px] rounded-full"></div>
        </div>
        <div class="w-full max-w-md bg-slate-900/80 border border-white/10 backdrop-blur-xl p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-shield-halved text-emerald-400 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Welcome Back</h2>
                <p class="text-slate-400 text-sm mt-1">Enter your credentials</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, msg in messages %}
                        <div class="mb-4 p-4 rounded-xl text-sm {% if category == 'success' %} bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 {% else %} bg-rose-500/10 text-rose-400 border border-rose-500/20 {% endif %}">{{ msg }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-slate-500 text-sm"></i>
                        <input type="email" name="email" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none transition-all" placeholder="name@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-500 text-sm"></i>
                        <input type="password" name="password" required class="w-full pl-10 pr-10 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none transition-all" placeholder="••••••••">
                        <button type="button" onclick="togglePassword(this)" class="absolute right-4 top-3.5 text-slate-500 hover:text-slate-300"><i class="fa-solid fa-eye text-sm"></i></button>
                    </div>
                    <div class="flex justify-end mt-2">
                        <a href="/forgot-password" class="text-xs text-emerald-400 hover:text-emerald-300 font-semibold transition">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-500/20">Sign In Securely</button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-slate-500 text-xs">Don't have an account? <a href="/register" class="text-emerald-400 hover:text-emerald-300 font-semibold transition">Register now</a></p>
            </div>
        </div>
    </main>
    <script>
        function togglePassword(btn) {
            const input = btn.parentElement.querySelector('input'), icon = btn.querySelector('i');
            if(input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash text-sm'; }
            else { input.type = 'password'; icon.className = 'fa-solid fa-eye text-sm'; }
        }
    </script>
</body>
</html>
