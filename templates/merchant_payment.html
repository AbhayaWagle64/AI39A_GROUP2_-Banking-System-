<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paisa | Merchant Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <nav class="border-b border-white/10 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 font-extrabold px-3 py-1 rounded-xl text-xl font-mono">eP</span>
                <span class="text-xl font-bold text-white">Merchant Pay</span>
            </div>
            <a href="/dashboard" class="text-xs font-bold text-emerald-400 hover:bg-emerald-500/10 px-3 py-2 rounded-xl transition">Dashboard</a>
        </div>
    </nav>
    
    <main class="flex-grow max-w-2xl mx-auto px-4 py-8 w-full">
        <div class="bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl">
            <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-store mr-2 text-amber-400"></i>Pay Merchant</h3>
            
            <form id="merchantForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Merchant ID or Phone</label>
                    <input type="text" id="merchantId" placeholder="MERCH-123 or 98XXXXXXXX" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Amount (NPR)</label>
                    <input type="number" id="merchantAmount" step="0.01" placeholder="0.00" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Purpose</label>
                    <select id="merchantPurpose" class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                        <option value="purchase">Purchase</option>
                        <option value="service">Service</option>
                        <option value="bill">Bill Payment</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Invoice Number (Optional)</label>
                    <input type="text" id="invoiceNumber" placeholder="INV-12345" 
                           class="w-full px-4 py-3 rounded-xl border border-white/10 bg-slate-950/50 text-white text-sm focus:border-emerald-500 focus:outline-none">
                </div>
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-white font-bold py-3 rounded-xl transition">
                    Pay Merchant
                </button>
            </form>
        </div>
        
        <!-- Saved Merchants -->
        <div class="mt-6 bg-slate-900/50 border border-white/5 backdrop-blur-md p-6 rounded-2xl shadow-xl">
            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Saved Merchants</h4>
            <div id="savedMerchants" class="space-y-2">
                <p class="text-slate-500 text-sm">No saved merchants yet</p>
            </div>
        </div>
    </main>
    
    <script>
        document.getElementById('merchantForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('phone', document.getElementById('merchantId').value);
            formData.append('amount', document.getElementById('merchantAmount').value);
            formData.append('purpose', document.getElementById('merchantPurpose').value);
            
            try {
                const r = await fetch('/api/send-money', { method: 'POST', body: formData });
                const d = await r.json();
                if (r.ok) {
                    alert('Merchant payment successful!');
                    window.location.href = '/dashboard';
                } else {
                    alert('Error: ' + d.error);
                }
            } catch (err) {
                alert('Payment failed: ' + err.message);
            }
        });
    </script>
</body>
</html>
